name: Backend Soroban E2E (Testnet)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  e2e-testnet:
    name: E2E Testnet Contract Flows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        run: pnpm turbo run build --filter=@quickex/backend

      - name: Skip Soroban E2E Flow (missing secrets)
        if: ${{ secrets.E2E_WALLET_SECRET == '' || secrets.QUICKEX_CONTRACT_ID == '' }}
        run: echo "Skipping Soroban E2E Flow: missing E2E_WALLET_SECRET or QUICKEX_CONTRACT_ID."

      - name: Run Soroban E2E Flow
        if: ${{ secrets.E2E_WALLET_SECRET != '' && secrets.QUICKEX_CONTRACT_ID != '' }}
        env:
          APP_ENV: staging
          STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          E2E_WALLET_SECRET: ${{ secrets.E2E_WALLET_SECRET }}
          QUICKEX_CONTRACT_ID: ${{ secrets.QUICKEX_CONTRACT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting E2E tests against Soroban testnet..."
          pnpm turbo run test:e2e --filter=@quickex/backend -- test/soroban-flow.e2e-spec.ts
